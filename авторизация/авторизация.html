<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авторизация — Корпоративная столовая</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .login-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    padding: 48px 40px;
    width: 100%;
    max-width: 420px;
  }

  .logo {
    width: 64px; height: 64px;
    background: #FFDD2D;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 700; color: #333;
    margin: 0 auto 24px;
  }

  h1 {
    text-align: center;
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
  }

  input {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #e8e8e8;
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    background: #fafafa;
  }

  input:focus, select:focus {
    border-color: #FFDD2D;
    background: #fff;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: #FFDD2D;
    color: #333;
    font-size: 15px;
    font-weight: 700;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
  }
  .btn:hover { background: #f5d000; }
  .btn:active { transform: scale(0.98); }

  .error-msg {
    background: #fff0f0;
    color: #d32f2f;
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  .footer-text {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #bbb;
  }

  /* Quick login buttons for demo */
  .quick-login { margin-top: 24px; }
  .quick-login p {
    font-size: 12px;
    color: #aaa;
    text-align: center;
    margin-bottom: 10px;
  }
  .quick-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .quick-btn {
    padding: 8px 16px;
    background: #f5f5f5;
    border: 1px solid #e0e0e0;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .quick-btn:hover { background: #e8e8e8; }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">Т</div>
  <h1>Корпоративная столовая</h1>
  <p class="subtitle">АО «ТБанк» — вход в систему</p>

  <div class="error-msg" id="errorMsg"></div>

  <form id="loginForm" autocomplete="off">
    <div class="field">
      <label for="login">Логин / Табельный номер</label>
      <input type="text" id="login" placeholder="Например: ivanov123" required>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <input type="password" id="password" placeholder="Введите пароль" required>
    </div>
    <button type="submit" class="btn">Войти</button>
  </form>

  <p class="footer-text">ИС «Корпоративная столовая» v1.0</p>
</div>

<script>
const demoUser = { login: 'petrov', password: '123', name: 'Петров А.С.' };

const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');

function showError(msg) {
  errorMsg.textContent = msg;
  errorMsg.style.display = 'block';
  setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const login = document.getElementById('login').value.trim();
  const password = document.getElementById('password').value.trim();

  if (login === demoUser.login && password === demoUser.password) {
    alert(`Вход выполнен: ${demoUser.name}\n\nПереход к навигации...`);
  } else {
    showError('Неверный логин или пароль');
  }
});
</script>
</body>
</html>
